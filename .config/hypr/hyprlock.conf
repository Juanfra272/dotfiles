$color0 = rgb(b20000)

background {
    monitor =
    path = $HOME/Pictures/wp3614504-star-wars-4k-wallpapers.jpg
    color = $color0

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_size = 5
    blur_passes = 0 # 0 disables blurring
    noise = 0.0117
    contrast = 1.3000 # Vibrant!!!
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 1.00 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $color0
    inner_color = $color0
    font_color = white
    fade_on_empty = true
    placeholder_text = <i>Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    position = 0, 60
    halign = center
    valign = bottom
}


# City name (top)
label {
    monitor =
    text = cmd[update:86400000] echo "<b> $(bash /home/juanfra/.config/hypr/city.sh) </b>"
    color = $color0
    font_size = 28
    font_family = SF Pro Rounded
    position = 0, -30
    halign = center
    valign = top
}

# Feels like (below city)
label {
    monitor =
    text = cmd[update:86400000] echo "feels like $(bash /home/juanfra/.config/hypr/weather.sh)"
    color = $color0
    font_size = 14
    font_family = SF Pro Rounded
    position = 0, -65
    halign = center
    valign = top
}

# Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H")</b>"
    color = $color0
    font_size = 128
    font_family = IBM Plex Sans Medium 10
    position = 0, 80
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%M")</b>"
    color = $color0
    font_size = 128
    font_family = IBM Plex Sans Medium 10
    position = 0, -60
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%d %b")"
    color = $color0
    font_size = 14
    font_family = IBM Plex Sans Medium 10
    position = 0, -140
    halign = center
    valign = center
}

# Day of week
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A")"
    color = $color0
    font_size = 14
    font_family = IBM Plex Sans Medium 10
    position = 0, -162
    halign = center
    valign = center
}
